<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>모임풀 | 우리들의 힙한 모임 초대장</title>
    <meta property="og:title" content="우리들의 힙한 모임, 모임풀 🏠" />
    <meta property="og:description" content="감각적인 초대장으로 파티를 시작하세요!" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80&w=1000" />
    <style>
      :root { --primary: #FF3366; --bg: #0f1115; }
      body { background-color: var(--bg); margin: 0; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; text-align: center; }
      #root { width: 100%; max-width: 480px; padding: 60px 24px; box-sizing: border-box; }
      .hero-badge { display: inline-block; background: rgba(255, 51, 102, 0.1); color: var(--primary); padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; margin-bottom: 24px; }
      .hero-title { font-size: 2.8rem; font-weight: 900; margin: 0 0 20px 0; line-height: 1.2; }
      .gradient-text { background: linear-gradient(90deg, #FF3366, #ff8a00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .hero-desc { font-size: 1.1rem; color: #9ca3af; line-height: 1.6; margin-bottom: 40px; }
      .primary-btn { background: var(--primary); color: white; padding: 16px 32px; border-radius: 16px; font-weight: 700; font-size: 1rem; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 51, 102, 0.2); text-decoration: none; display: inline-block; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .animate { animation: fadeIn 0.8s ease-out forwards; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="animate">
        <div class="hero-badge">Coming Soon</div>
        <h1 class="hero-title">우리들의 힙한 모임,<br/><span class="gradient-text">모임풀(MoimPull)</span></h1>
        <p class="hero-desc">해외의 Partiful처럼 감각적인 초대장을 이제 한국에서도.<br/>카톡 공유 한 번으로 완벽한 파티를 시작하세요.</p>
        <a href="#" class="primary-btn">초대장 만들기</a>
      </div>
    </div>
    <!-- 리액트는 배경에서 로드됨 -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
