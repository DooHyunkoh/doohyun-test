<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 재물복 판독기 - 내 안의 부자 기운 찾기</title>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --neon-lime: #ccff00;
            --purple: #a020f0;
            --bg-color: #000000;
            --text-color: #ffffff;
            --card-bg: #111111;
            --border-color: #333333;
            --subtitle-color: #888888;
        }
        [data-theme='light'] {
            --bg-color: #ffffff;
            --text-color: #000000;
            --card-bg: #f9f9f9;
            --border-color: #dddddd;
            --subtitle-color: #666666;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 500px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            font-size: 1.2rem;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--neon-lime), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .subtitle {
            color: var(--subtitle-color);
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed var(--neon-lime);
            border-radius: 20px;
            padding: 50px 20px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(204, 255, 0, 0.05);
            margin-bottom: 20px;
            position: relative;
        }
        .upload-area.drag-over {
            background: rgba(204, 255, 0, 0.2);
            transform: scale(1.02);
        }
        .upload-area:hover {
            background: rgba(204, 255, 0, 0.1);
            box-shadow: 0 0 20px rgba(204, 255, 0, 0.2);
        }
        .preview-container {
            position: relative;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(160, 32, 240, 0.3);
        }
        .preview-image {
            width: 100%;
            display: block;
        }
        .scanning-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--neon-lime);
            box-shadow: 0 0 15px var(--neon-lime);
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }
        .analyzing-text {
            color: var(--neon-lime);
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 1px;
        }
        .result-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .score-badge {
            display: inline-block;
            background: var(--neon-lime);
            color: #000;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 900;
            margin-bottom: 15px;
        }
        .investment-type {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }
        .advice {
            color: var(--subtitle-color);
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            flex: 1;
            min-width: 120px;
        }
        .btn-primary { background: var(--neon-lime); color: #000; }
        .btn-secondary { background: var(--purple); color: #fff; }
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .hidden { display: none; }
        footer { margin-top: 50px; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const RESULTS = [
            {
                type: '주식/코인형 (Aggressive)',
                score: 95,
                advice: '당신은 차트를 꿰뚫어 보는 "매의 눈"을 가졌군요. 시장의 변동성을 즐기며 단기 주식 매매나 코인 투자에서 큰 수익을 거둘 관상입니다.',
            },
            {
                type: '부동산/금형 (Stable)',
                score: 88,
                advice: '덕망 있고 차분한 인상입니다. 시간이 지날수록 가치가 오르는 자산에 운이 따릅니다. 부동산이나 금과 같은 안정적인 투자처가 제격입니다.',
            },
            {
                type: '자수성가형 (Energetic)',
                score: 92,
                advice: '끊임없는 에너지와 도전 정신이 얼굴에 나타나 있습니다. 스스로 기회를 창출하고 사업을 통해 막대한 부를 쌓을 관상입니다.',
            },
            {
                type: '글로벌 유니콘 CEO형 (Visionary)',
                score: 98,
                advice: '평범함을 거부하는 혁신가의 기운이 넘칩니다. 당신의 작은 아이디어가 곧 거대한 자본이 될 관상입니다. 글로벌 시장을 겨냥하세요!',
            },
            {
                type: '로또 당첨급 럭키형 (Lucky)',
                score: 99,
                advice: '조상님이 도우시는 천부적인 천운을 타고나셨네요. 예상치 못한 곳에서 큰 재물이 굴러들어올 관상입니다. 오늘 바로 복권을 사보시는 건 어떨까요?',
            },
            {
                type: '예술가적 자산가형 (Creative)',
                score: 87,
                advice: '미적 감각이 곧 부로 연결되는 운입니다. 예술품 투자, 저작권 수입, 혹은 나만의 창의적인 콘텐츠가 평생의 연금이 될 관상입니다.',
            },
            {
                type: '마이더스의 손 (Midas)',
                score: 94,
                advice: '손만 대면 황금으로 변하는 재능을 가졌습니다. 어떤 사업을 하든 이익을 남기는 탁월한 비즈니스 감각이 얼굴에 서려 있군요.',
            },
            {
                type: '조용한 자산가 (Quiet Rich)',
                score: 91,
                advice: '겉으로는 평범해 보이지만 뒤에서는 막대한 부를 굴리는 실속파입니다. 남들 모르게 알짜 자산을 모아 평생 돈 걱정 없이 살 관상입니다.',
            }
        ];

        function App() {
            const [image, setImage] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [theme, setTheme] = useState('dark');
            const [isDragging, setIsDragging] = useState(false);
            const fileInputRef = useRef(null);
            const resultRef = useRef(null);

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            const handleImageProcess = (file) => {
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setImage(reader.result);
                        setIsAnalyzing(true);
                        setResult(null);
                        setTimeout(() => {
                            const random = RESULTS[Math.floor(Math.random() * RESULTS.length)];
                            setResult({...random, score: random.score + Math.floor(Math.random() * 5)});
                            setIsAnalyzing(false);
                        }, 3000);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const onDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const file = e.dataTransfer.files[0];
                handleImageProcess(file);
            };

            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

            const handleSaveImage = async () => {
                const canvas = await html2canvas(resultRef.current, {
                    backgroundColor: theme === 'dark' ? '#000000' : '#ffffff'
                });
                const link = document.createElement('a');
                link.download = 'my-wealth-fortune.png';
                link.href = canvas.toDataURL();
                link.click();
            };

            const handleShare = async () => {
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'AI 재물복 판독기 결과',
                            text: `나의 재물운 점수는 ${result.score}점! 당신의 부자 기운을 확인해보세요.`,
                            url: window.location.href,
                        });
                    } catch (err) {
                        console.log('Error sharing:', err);
                    }
                } else {
                    alert('공유하기를 지원하지 않는 브라우저입니다. 결과 이미지를 저장하여 공유해 주세요!');
                }
            };

            return (
                <div className="container">
                    <button className="theme-toggle" onClick={toggleTheme}>
                        {theme === 'dark' ? '☀️' : '🌙'}
                    </button>
                    
                    <h1>AI 재물복 판독기</h1>
                    <p className="subtitle">얼굴 속 부자의 기운을 지금 바로 확인하세요</p>

                    {!image && (
                        <div 
                            className={`upload-area ${isDragging ? 'drag-over' : ''}`}
                            onClick={() => fileInputRef.current.click()}
                            onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                            onDragLeave={() => setIsDragging(false)}
                            onDrop={onDrop}
                        >
                            <div style={{fontSize: '3rem', marginBottom: '10px'}}>📸</div>
                            <p>사진을 업로드하거나 여기로 드래그하세요</p>
                            <input 
                                type="file" 
                                ref={fileInputRef} 
                                onChange={(e) => handleImageProcess(e.target.files[0])} 
                                accept="image/*" 
                                className="hidden" 
                            />
                        </div>
                    )}

                    {image && !result && (
                        <div className="preview-container">
                            <img src={image} className="preview-image" />
                            {isAnalyzing && <div className="scanning-line"></div>}
                        </div>
                    )}

                    {isAnalyzing && <div className="analyzing-text">AI 관상 분석 중...</div>}

                    {result && (
                        <div ref={resultRef} className="result-card">
                            <div className="score-badge">재물운: {result.score}점</div>
                            <div className="investment-type">{result.type}</div>
                            <p className="advice">{result.advice}</p>
                            <div className="btn-group">
                                <button className="btn btn-primary" onClick={handleSaveImage}>이미지 저장</button>
                                <button className="btn btn-secondary" onClick={handleShare}>결과 공유</button>
                                <button className="btn btn-outline" onClick={() => {setImage(null); setResult(null);}}>다시하기</button>
                            </div>
                        </div>
                    )}

                    <footer>© 2026 AI Wealth Fortune Reader.</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
